name: conformance

# Every implementation passes the canonical conformance vectors for the
# specification version it declares - 137 (V01-V137) at 4.0.0 - or it is not
# Causalontology. All nineteen bindings now implement the folded
# 3.0.0-plus-4.0.0 delta and are gated at 137 vectors here (registry
# publication is a separate, credential-gated step per the 4.0.0 release plan).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: conformance (137 vectors)
        run: python3 bindings/python/tests/run_conformance.py
      - name: Tier A store smoke
        run: python3 store/server/test_server.py
      - name: stigmergy layer
        run: python3 store/server/test_stigmergy.py
      - name: SPARQL, reputation, Tier B federation
        run: python3 store/server/test_beyond.py
      - name: Tier C replication (the CRDT laws)
        run: python3 store/server/test_tierc.py
      - name: persistent node (Phase one, Part 21)
        run: python3 store/server/test_persistence.py

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: conformance (137 vectors)
        run: node bindings/javascript/tests/run_conformance.js

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: conformance (137 vectors)
        run: bash bindings/java/run_conformance.sh

  swift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.10"
      - name: conformance (137 vectors)
        run: cd bindings/swift && swift run conformance

  gardener:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install SWI-Prolog
        run: sudo apt-get update && sudo apt-get install -y swi-prolog
      - name: the synthetic mind gardens the commons
        run: python3 examples/gardener/test_gardener.py

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: conformance (137 vectors)
        run: cd bindings/rust && cargo run --bin conformance
      - name: WebAssembly core build
        run: cd bindings/rust && cargo build --lib --release --target wasm32-unknown-unknown
      - name: WASM vs JavaScript cross-check
        run: node bindings/rust/tests/wasm_check.js

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      # The 4.0.0 code is the new /v4 module (Go versions the import path); the
      # /v2 module stays live at the 2.0.0 level. Gate on /v4.
      - name: conformance (137 vectors)
        run: cd bindings/go/v4 && go run ./conformance

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: type-check the typed JavaScript binding
        run: cd bindings/javascript && npx -y -p typescript@5.5 tsc -p .

  csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "8.0.x"
      - name: conformance (137 vectors)
        run: dotnet run --project bindings/csharp/conformance

  ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: conformance (137 vectors)
        run: ruby bindings/ruby/conformance.rb

  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: sodium
      - name: conformance (137 vectors)
        run: php bindings/php/conformance.php

  dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - name: conformance (137 vectors)
        run: dart bindings/dart/bin/conformance.dart

  elixir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "26"
          elixir-version: "1.16"
      - name: conformance (137 vectors)
        run: cd bindings/elixir && elixir conformance.exs

  haskell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The binding uses only GHC boot packages (base, bytestring, containers,
      # filepath, directory), so it needs no Hackage index at all. Skip the
      # setup action's internal `cabal update` (it fetches a Hackage mirror that
      # has 404'd, failing the job in setup before conformance can run) and run
      # the vectors directly with runghc - no cabal, no network, boot packages
      # only. Verified locally: 137/137.
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6"
          cabal-update: false
      - name: conformance (137 vectors)
        run: cd bindings/haskell && runghc -isrc -iapp app/Conformance.hs

  perl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: conformance (137 vectors)
        run: perl bindings/perl/conformance.pl

  r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: crypto libraries + R packages
        run: |
          sudo apt-get update && sudo apt-get install -y libsodium-dev libssl-dev
          Rscript -e "install.packages(c('sodium','openssl'), repos='https://cloud.r-project.org')"
      - name: conformance (137 vectors)
        run: Rscript bindings/r/conformance.R

  lua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install Lua 5.4
        run: sudo apt-get update && sudo apt-get install -y lua5.4
      - name: conformance (137 vectors)
        run: lua5.4 bindings/lua/conformance.lua

  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: conformance (137 vectors)
        run: bash bindings/cpp/run_conformance.sh

  zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: conformance (137 vectors)
        run: bash bindings/zig/run_conformance.sh

  julia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v3
        with:
          version: "1.10"
      - name: conformance (137 vectors)
        run: julia bindings/julia/conformance.jl

  kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: conformance (137 vectors)
        run: bash bindings/kotlin/run_conformance.sh

  # The reference implementation gates itself. Prolog is listed first among the
  # bindings and PrologAI is named the reference implementation, so its
  # conformance must be gated here, not merely asserted in prose. PrologAI is
  # checked out beside the standard and run through its own canonical
  # conformance harness (built in PrologAI Work Package 425 / WP-425) against
  # THIS repository's canonical conformance/vectors/ (137 at 4.0.0). Both
  # repositories thus stay in lockstep on one vector set: the reference
  # implementation cannot silently drift from the specification. This job is
  # distinct from the `gardener` job, which also installs SWI-Prolog but runs
  # the Mentova gardener demo rather than the 137 conformance vectors.
  prolog:
    runs-on: ubuntu-latest
    steps:
      # The standard: this repository's canonical conformance/vectors/ frozen at
      # specification 4.0.0 (137 vectors).
      - name: check out the standard (causalontology)
        uses: actions/checkout@v4
        with:
          path: causalontology
      # The reference implementation, tracked at its MOVING main branch, not a
      # fixed commit. This is deliberate: the job's purpose is DRIFT DETECTION,
      # and a fixed pin cannot detect drift -- it can only freeze the gate at one
      # historical revision, which is precisely how the old 7b3aa86 pin fell
      # behind Wave 1 and stopped testing what ships. The accepted trade-off:
      # this job is intentionally NOT reproducible across time. The same
      # causalontology commit may go green today and red tomorrow if PrologAI's
      # main regresses or the standard re-baselines ahead of it -- that is the gate
      # working, not a flake. This is safe
      # because PrologAI self-gates the same canonical vectors it vendors on its own push, so
      # its main is either conformant or already red at the source.
      #
      # Considered alternative (recorded so the choice is remembered as a
      # choice): if reproducibility ever matters more than freshness, replace
      # `main` with a moving tag (e.g. causalontology-gate) that PrologAI
      # advances only after it verifies the full canonical count, and pin this job to that tag.
      # That trades drift-detection latency for reproducibility. Not adopted:
      # freshness is the point of this gate.
      - name: check out the reference implementation (PrologAI)
        uses: actions/checkout@v4
        with:
          repository: ai-university-aiu/PrologAI
          ref: main
          path: prologai
      - name: install SWI-Prolog
        run: sudo apt-get update && sudo apt-get install -y swi-prolog
      # Overlay the standard's canonical vectors onto the harness's vendored
      # copy, then run PrologAI's harness. Overlaying the canonical set means any
      # drift between the two repositories fails this job; a clean run gates the
      # reference implementation on the exact canonical vectors the other bindings
      # are gated on. When the standard re-baselines ahead of PrologAI (as at a
      # major version), this job goes red until PrologAI catches up - that is
      # the gate working, not a flake.
      - name: conformance (canonical vectors, reference implementation vs canonical)
        run: |
          cp -a causalontology/conformance/vectors/. prologai/tests/causalontology_conformance/vectors/
          cd prologai && ./bin/run_causalontology_conformance.sh
